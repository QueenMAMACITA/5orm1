<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>💖 Special Surprise 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family: 'Arial', sans-serif;
    text-align:center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow:hidden;
}

h1 {
    margin-top: 100px;
    font-size: 40px;
}

button {
    padding: 15px 30px;
    font-size: 20px;
    border: none;
    border-radius: 10px;
    background: #ff4b5c;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.1);
}

/* popup style */
.popup {
    position: fixed;
    background: white;
    border: 3px solid black;
    padding: 20px;
    top: 20%;
    left: 20%;
    width: 250px;
    z-index: 9999;
    box-shadow: 0 0 20px black;
}

.glitch {
    animation: shake 0.1s infinite;
}

@keyframes shake {
    0% { transform: translate(2px, 2px); }
    50% { transform: translate(-2px, -2px); }
    100% { transform: translate(2px, -2px); }
}
</style>
</head>

<body>

<h1>💖 Click for a surprise 💖</h1>
<button onclick="startPrank()">Click Me 😘</button>

<script>
function startPrank() {
    document.body.innerHTML = "<h1>Loading surprise... 😍</h1>";

    setTimeout(fakeScan, 1500);
}

function fakeScan() {
    let progress = 0;
    document.body.innerHTML = "<h1>🔍 Scanning your device...</h1><p id='scan'>0%</p>";

    let interval = setInterval(() => {
        progress += Math.floor(Math.random()*10);

        if(progress >= 100) {
            clearInterval(interval);
            virusDetected();
        }

        document.getElementById("scan").innerText = progress + "%";
    }, 200);
}

function virusDetected() {
    document.body.classList.add("glitch");
    document.body.innerHTML = "<h1>⚠️ VIRUS DETECTED ⚠️</h1>";

    // spam popups
    for(let i=0; i<10; i++) {
        setTimeout(() => createPopup(), i * 300);
    }

    setTimeout(loveMessage, 4000);
}

function createPopup() {
    let popup = document.createElement("div");
    popup.className = "popup";
    popup.innerHTML = `
        <h3>😱 WARNING</h3>
        <p>Your phone is hacked!</p>
        <button onclick="this.parentElement.remove()">Close</button>
    `;
    popup.style.top = Math.random()*80 + "%";
    popup.style.left = Math.random()*80 + "%";
    document.body.appendChild(popup);
}

function loveMessage() {
    document.body.classList.remove("glitch");
    document.body.innerHTML = `
        <h1>😂 GOT YOU!</h1>
        <h2>I love you ❤️</h2>
        <p>You just got pranked 😎</p>
    `;

    // confetti effect
    for(let i=0;i<100;i++){
        let div = document.createElement("div");
        div.style.position = "fixed";
        div.style.width = "10px";
        div.style.height = "10px";
        div.style.background = "hsl(" + Math.random()*360 + ",100%,50%)";
        div.style.top = Math.random()*100 + "%";
        div.style.left = Math.random()*100 + "%";
        div.style.borderRadius = "50%";
        document.body.appendChild(div);
    }
}
</script>

</body>
</html>
