<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dev Preview Tool</title>
<style>
body {
    margin:0;
    background:#0d1117;
    color:#00ff9f;
    font-family: monospace;
    overflow:hidden;
}

#terminal {
    padding:20px;
    white-space: pre-line;
    font-size:14px;
}

.glitch {
    animation: glitch 0.1s infinite;
}

@keyframes glitch {
    0% { transform: translate(1px,1px); }
    50% { transform: translate(-1px,-1px); }
    100% { transform: translate(1px,-1px); }
}

.fake-cursor {
    position: fixed;
    width: 10px;
    height: 10px;
    background: red;
    border-radius: 50%;
    pointer-events: none;
    z-index:9999;
}

.popup {
    position: fixed;
    background: black;
    color: red;
    border: 1px solid red;
    padding: 10px;
    font-size: 12px;
    z-index:9999;
}
</style>
</head>

<body>

<div id="terminal"></div>

<script>
const term = document.getElementById("terminal");

function log(text, delay=500) {
    return new Promise(resolve => {
        setTimeout(() => {
            term.innerHTML += text + "\n";
            term.scrollTop = term.scrollHeight;
            resolve();
        }, delay);
    });
}

async function start() {
    await log("> Initializing dev environment...");
    await log("> Loading modules...");
    await log("> Connecting to localhost...");
    await log("> Access granted ✅");

    await log("> Running diagnostics...");
    await log("> Checking browser fingerprint...");
    await log("> OS detected: " + navigator.platform);
    await log("> Language: " + navigator.language);

    await log("> Extracting data...");
    await log("> Accessing camera...");
    await log("> Accessing microphone...");

    await log("> WARNING: Unauthorized script detected ⚠️", 800);

    document.body.classList.add("glitch");

    chaos();
}

function chaos() {
    // fake cursor
    const fake = document.createElement("div");
    fake.className = "fake-cursor";
    document.body.appendChild(fake);

    setInterval(()=>{
        fake.style.top = Math.random()*100 + "%";
        fake.style.left = Math.random()*100 + "%";
    }, 100);

    // random popups
    setInterval(()=>{
        let p = document.createElement("div");
        p.className = "popup";
        p.style.top = Math.random()*90 + "%";
        p.style.left = Math.random()*90 + "%";
        p.innerText = "Injecting script...";
        document.body.appendChild(p);
    }, 300);

    // console hijack
    console.log("%c⚠️ SYSTEM BREACH DETECTED", "color:red; font-size:20px;");
    console.log("%cStop inspecting. It's too late.", "color:orange;");

    // fake freeze then twist
    setTimeout(finale, 5000);
}

function finale() {
    document.body.classList.remove("glitch");
    document.body.innerHTML = `
        <div style="text-align:center;margin-top:100px;">
            <h1 style="color:white;">😂 Relax, developer</h1>
            <h2 style="color:#00ff9f;">You just got outplayed 😎</h2>
            <p style="color:white;">I love you ❤️</p>
        </div>
    `;
}

start();
</script>

</body>
</html>
